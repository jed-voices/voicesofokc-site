name: Update latest episode data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-latest-episode:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Update latest episode JSON from Podbean feed
        env:
          PODBEAN_FEED_URL: "https://feed.podbean.com/voicesofokc/feed.xml"
          YOUTUBE_URL: "https://youtube.com/@voicesofokc"
          SPOTIFY_URL: "https://open.spotify.com/show/3nUpFLOsHGVtrN8tZz6nlM?si=478a6beb645b40f6"
          APPLE_URL: "https://podcasts.apple.com/us/podcast/voices-of-okc/id1847725322"
        run: python scripts/update_latest_episode.py

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/latest-episode.json
          git diff --cached --quiet || git commit -m "Update latest episode data"
          git push
